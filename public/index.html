<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saisie des départs — Boeuf &amp; Cow</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="brand-name">Bœuf <span class="amp">&amp;</span> Cow</span><span class="brand-tag">Saisie des horaires de départ</span></div>
    <a href="admin.html">Administration →</a>
  </div>

  <div class="container">
    <div class="clock">
      <div class="time" id="clock-time">--:--</div>
      <div class="date" id="clock-date"></div>
    </div>

    <div class="employees-grid" id="employees"></div>

    <!-- Planning de la semaine (lecture seule) -->
    <div class="panel" id="planning-view-panel" style="margin-top:26px">
      <div class="pv-head">
        <h2 style="margin:0">Planning de la semaine</h2>
        <div class="pv-nav">
          <button class="btn btn-ghost" id="pv-prev">‹ Préc.</button>
          <span id="pv-label"></span>
          <button class="btn btn-ghost" id="pv-next">Suiv. ›</button>
        </div>
      </div>
      <div class="table-wrap"><div id="pv-output"><div class="empty">Chargement…</div></div></div>
    </div>
  </div>

  <!-- Modale PIN / actions -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal"><!-- rempli dynamiquement --></div>
  </div>

  <script src="planning-view.js"></script>
  <script src="app.js"></script>
</body>
</html>
